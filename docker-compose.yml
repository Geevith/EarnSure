version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db
      - redis

  worker:
    build: .
    command: celery -A app.tasks.worker.celery_app worker --loglevel=info
    volumes:
      - .:/code
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - api

  db:
    image: postgis/postgis:15-3.3
    ports:
      - "5433:5432"
    environment:
      # This matches the credentials in your .env file!
      - POSTGRES_USER=earnsure
      - POSTGRES_PASSWORD=earnsure_pass
      - POSTGRES_DB=earnsure_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: